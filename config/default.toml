[general]
mode = "dry-run"  # "observation" | "dry-run" | "live"
log_level = "debug"
data_dir = "./data"
simulated_equity = 10000.0  # Starting equity for dry-run ($)

[exchange]
ws_url = "wss://api.hyperliquid.xyz/ws"
rest_url = "https://api.hyperliquid.xyz"
wallet_address = ""
agent_private_key = ""  # Set via env GBOT_AGENT_PRIVATE_KEY
subaccount = ""

[exchange.rate_limit]
max_weight_per_minute = 1200
candle_base_weight = 20
info_heavy_weight = 20    # meta, openOrders
info_light_weight = 2     # allMids, clearinghouseState
order_weight = 1

[exchange.timeouts]
connect_ms = 10000
read_ms = 30000
ws_heartbeat_s = 30
ws_stale_s = 60

[exchange.reconnect]
initial_delay_ms = 1000
max_delay_ms = 30000
backoff_factor = 2.0

[coins]
active = [
  # Tier 1 — très haute liquidité, spreads ultra-serrés
  "BTC", "ETH", "SOL",
  # Tier 2 — bonne liquidité, microstructure saine
  "AVAX", "LINK", "NEAR", "ARB", "OP",
  # Tier 3 — volume élevé, spreads parfois plus larges
  "DOGE", "XRP", "SUI",
  # Hyperliquid natif — très actif sur la plateforme
  "HYPE",
]

[features]
# Ring buffer sizes
trade_tape_size = 1000
# Flow feature windows (seconds)
ofi_windows = [1.0, 3.0, 10.0, 30.0]
vol_windows = [3.0, 10.0, 30.0]
# Toxicity lookahead
toxicity_lookahead_s = 5.0
toxicity_sample_size = 100

[regime]
# QuietTight thresholds
quiet_tight_max_spread_bps = 2.0
quiet_tight_max_toxicity = 0.4
quiet_tight_max_vol_ratio = 1.5
quiet_tight_min_depth_usd = 10000.0

# ActiveHealthy thresholds
active_healthy_max_spread_bps = 8.0
active_healthy_max_toxicity = 0.6
active_healthy_max_vol_ratio = 2.0
active_healthy_min_depth_usd = 5000.0

# ActiveToxic thresholds
active_toxic_min_toxicity = 0.7

# DoNotTrade thresholds
dnt_max_spread_bps = 15.0
dnt_max_vol_ratio = 4.0
dnt_min_depth_usd = 1000.0

# funding boundary
funding_boundary_no_entry_s = 60
funding_boundary_force_exit_s = 30

# Cancel/add ratio
max_cancel_add_ratio = 0.9

[strategy]
# Direction score weights
w_ofi = 0.25
w_micro_price = 0.20
w_vamp = 0.20
w_aggression = 0.15
w_depth_ratio = 0.10
w_toxicity = 0.10

# Thresholds
direction_threshold_long = 0.5
direction_threshold_short = -0.5

# Pullback
pullback_retrace_pct = 0.003   # 30-50% retrace of micro-move
max_wait_pullback_s = 30

# Queue desirability weights
queue_w_spread = 0.25
queue_w_imbalance = 0.25
queue_w_toxicity = 0.20
queue_w_depth = 0.15
queue_w_vol = 0.15
queue_score_threshold = 0.3

[risk]
max_loss_per_trade_pct = 1.5
max_open_positions = 5
max_directional_bias = 3
max_margin_usage_pct = 60.0
max_daily_loss_pct = 10.0
drawdown_throttle_start_pct = 7.0
drawdown_throttle_severe_pct = 12.0
drawdown_circuit_breaker_pct = 20.0
cooldown_after_close_s = 60
max_slippage_pct = 0.5
min_spread_bps = 0.0
max_spread_bps = 10.0
min_depth_usd = 5000.0
max_toxicity = 0.7
max_vol_ratio = 3.0
equity_spike_guard_pct = 5.0

[risk.leverage]
min_leverage = 1
max_leverage = 20
default_leverage = 10

[execution]
max_hold_s = 300          # 5 minutes
max_mae_bps = 15.0        # max adverse excursion
order_timeout_s = 60
fill_poll_interval_s = 5
sync_interval_s = 30

[execution.breakeven]
trigger_pct = 50.0        # TP progress % to trigger BE
detection_tolerance_pct = 0.2

[execution.trailing]
# Trailing stop paliers
tier1_progress_pct = 65.0
tier1_lock_pct = 25.0
tier2_progress_pct = 80.0
tier2_lock_pct = 50.0

[recording]
enabled = true
flush_interval_s = 60
