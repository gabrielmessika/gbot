[general]
mode = "dry-run"  # "observation" | "dry-run" | "live"
log_level = "debug"
data_dir = "./data"
simulated_equity = 10000.0  # Starting equity for dry-run ($)

[exchange]
ws_url = "wss://api.hyperliquid.xyz/ws"
rest_url = "https://api.hyperliquid.xyz"
wallet_address = ""
agent_private_key = ""  # Set via env GBOT_AGENT_PRIVATE_KEY
subaccount = ""

[exchange.rate_limit]
max_weight_per_minute = 1200
candle_base_weight = 20
info_heavy_weight = 20    # meta, openOrders
info_light_weight = 2     # allMids, clearinghouseState
order_weight = 1

[exchange.timeouts]
connect_ms = 10000
read_ms = 30000
ws_heartbeat_s = 30
ws_stale_s = 120

[exchange.reconnect]
initial_delay_ms = 5000     # Start at 5s (was 1s — too aggressive after IP rate limit)
max_delay_ms = 60000        # Max 60s (was 30s)
backoff_factor = 2.0

[coins]
active = [
  # Tier 1
  "BTC", "ETH", "SOL",
  # Tier 2
  "AVAX", "LINK", "ARB",
  # Tier 3
  "DOGE", "XRP", "SUI",
  # Hyperliquid natif
  "HYPE",
  # WIF, PEPE, TIA, SEI, INJ disabled:
  # 15 coins (30 subs) causes WS reset even with 100ms pacing.
  # 12 coins (24 subs) was stable in V2.0/V2.1. Testing 10 coins (20 subs).
]

[features]
# Ring buffer sizes
trade_tape_size = 1000
# Flow feature windows (seconds)
ofi_windows = [1.0, 3.0, 10.0, 30.0]
vol_windows = [3.0, 10.0, 30.0]
# Toxicity lookahead
toxicity_lookahead_s = 5.0
toxicity_sample_size = 100

[regime]
# QuietTight thresholds
quiet_tight_max_spread_bps = 2.0
quiet_tight_max_toxicity = 0.4
quiet_tight_max_vol_ratio = 1.5
quiet_tight_min_depth_usd = 10000.0

# ActiveHealthy thresholds
active_healthy_max_spread_bps = 8.0
active_healthy_max_toxicity = 0.6
active_healthy_max_vol_ratio = 2.0
active_healthy_min_depth_usd = 5000.0

# ActiveToxic thresholds
active_toxic_min_toxicity = 0.7

# DoNotTrade thresholds
dnt_max_spread_bps = 15.0
dnt_max_vol_ratio = 4.0
dnt_min_depth_usd = 1000.0

# funding boundary
funding_boundary_no_entry_s = 60
funding_boundary_force_exit_s = 30

# Cancel/add ratio
max_cancel_add_ratio = 0.9

# Ranging filter: minimum |price_return_30s| in bps for market to be considered trending.
# V2.1 data: 3.0 bps let through too many flat-market trades (82 trades, WR=13%).
# With 6bps round-trip fees, need |pr30s| > fees to have any directional edge.
trending_min_bps = 5.0


[strategy]
# Direction score weights — primary: price momentum (corr=+0.354 vs OFI corr=+0.058)
w_pr5s = 0.40         # price_return_5s normalized (5bps = full signal)
w_pr10s = 0.20        # price_return_10s normalized (10bps = full signal)
w_micro_price = 0.15  # micro_price_vs_mid_bps
w_vamp = 0.15         # vamp_signal_bps
w_depth_imb = 0.15    # imbalance_weighted (signed book depth)
w_toxicity = 0.10     # penalty

# Thresholds — raised from 0.52 to reduce low-quality signals (Q2-Q4 had 0 TP at low scores)
direction_threshold_long = 0.60
direction_threshold_short = -0.60

# Pullback entry timing — independent timeouts per phase (bug fix: shared budget = 5/50 setups failed)
pullback_retrace_pct = 0.35       # Enter after 35% retrace of the micro-move
pullback_wait_move_s = 20         # Abandon WaitingMove phase after 20s
pullback_wait_retrace_s = 20      # Abandon WaitingPullback phase after 20s (independent budget)
pullback_min_move_bps = 1.5       # Minimum micro-move (bps) to arm the pullback wait (was 3.0)
pullback_ofi_confirm = 0.0        # OFI 10s threshold post-pullback (0.0 = any directional OFI)

# Queue desirability weights
queue_w_spread = 0.25
queue_w_imbalance = 0.25
queue_w_toxicity = 0.20
queue_w_depth = 0.15
queue_w_vol = 0.15
queue_score_threshold = 0.5

# Dynamic SL/TP — SL = max(sl_min_bps, sl_vol_multiplier × realized_vol_30s), capped at sl_max_bps
# RULE: SL must be >= 2× round-trip fees (6bps). sl_min=5 caused 51% SL hit rate (noise).
# V2.2: SL=8bps (safe from noise + fees), TP=12bps (RR=1.5, breakeven WR=40%).
sl_vol_multiplier = 3.0   # SL = 3× realized 30s volatility
sl_min_bps = 8.0          # SL floor: > 2× fees (6bps). Was 5.0 (V2.1, too tight) / 12.0 (V2.0, too far)
sl_max_bps = 30.0         # SL cap
target_rr = 1.5           # TP = SL × 1.5 → TP~12bps. Breakeven WR=40%

# Direction confirmation — require N consecutive evaluations with score above threshold
# V2.1: 3 → V2.2: 5 (blocked 100% of trades, 0/1010 reached 5/5) → V2.2b: back to 3.
# Session 5 Phase A: 3 confirmations → 46 trades/7h, WR=37%, P&L≈neutral.
min_direction_confirmations = 3

# Feature maturity — minimum trades in 10s window before producing a signal
min_trades_for_signal = 5

[risk]
max_loss_per_trade_pct = 1.5
max_open_positions = 5
max_directional_bias = 3
max_margin_usage_pct = 60.0
max_daily_loss_pct = 10.0
drawdown_throttle_start_pct = 7.0
drawdown_throttle_severe_pct = 12.0
drawdown_circuit_breaker_pct = 20.0
cooldown_after_close_s = 120
max_slippage_pct = 0.5
min_spread_bps = 0.0
max_spread_bps = 10.0
min_depth_usd = 5000.0
max_toxicity = 0.7
max_vol_ratio = 3.0
equity_spike_guard_pct = 5.0
# Per-coin signal quota: max signals per coin in any rolling 10-minute window.
# V2.3: 6 → 2. Apr 4 showed 37 consecutive ETH Short trades (WR=0%, -$286).
# With quota=6 + cooldown=120s, one coin monopolized 100% of activity.
# Quota=2 forces diversification across coins.
max_signals_per_coin_10min = 2

# Streak breaker: after N consecutive SL_HIT on a coin, block it for block_s seconds.
# Apr 4: 34 consecutive ETH SL_HIT. With streak_max=3, would have stopped after 3 (-$25 vs -$286).
sl_streak_max = 3
sl_streak_block_s = 1800   # 30 minutes

[risk.leverage]
min_leverage = 1
max_leverage = 20
default_leverage = 10

[execution]
max_hold_s = 45           # ~45s: momentum autocorrelation decays to ~0 at 60s
max_mae_bps = 12.0        # max adverse excursion (aligned with SL=8bps)
order_timeout_s = 60
fill_poll_interval_s = 5
sync_interval_s = 30

[execution.breakeven]
trigger_pct = 50.0        # TP progress % to trigger BE (50% of 12bps TP = 6bps = covers fees)
detection_tolerance_pct = 0.2

[execution.trailing]
# V2.2: TP~12bps. tier1 at 60% (7.2bps), tier2 at 80% (9.6bps).
tier1_progress_pct = 60.0   # Lock 30% of profit at 60% TP progress (~7bps on 12bps TP)
tier1_lock_pct = 30.0
tier2_progress_pct = 80.0   # Lock 50% of profit at 80% TP progress (~10bps on 12bps TP)
tier2_lock_pct = 50.0

[recording]
enabled = true
flush_interval_s = 60
