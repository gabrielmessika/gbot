<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gbot — MFDP Dashboard</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>
    <!-- HEADER -->
    <header id="header">
        <div class="header-left">
            <span class="logo">gbot</span>
            <span id="live-dot" class="dot dot-grey" title="Connecting..."></span>
        </div>
        <div class="header-metrics">
            <div class="header-metric">
                <span class="label">Equity</span>
                <span id="equity" class="value">—</span>
            </div>
            <div class="header-metric">
                <span class="label">Daily P&L</span>
                <span id="daily-pnl" class="value">—</span>
            </div>
            <div class="header-metric">
                <span class="label">Drawdown</span>
                <span id="drawdown" class="value">—</span>
            </div>
            <div class="header-metric">
                <span class="label">Positions</span>
                <span id="pos-count" class="value">0</span>
            </div>
        </div>
    </header>

    <!-- MAIN GRID: 2 columns -->
    <main class="grid-main">
        <!-- LEFT: Order Books -->
        <section class="panel" id="panel-books">
            <h2>Carnet en temps réel</h2>
            <div id="books-container">
                <div class="empty-state">En attente de données...</div>
            </div>
        </section>

        <!-- RIGHT: Positions + Pending -->
        <section class="panel" id="panel-positions">
            <h2>Positions & Ordres</h2>
            <div id="positions-container">
                <div class="empty-state">Aucune position</div>
            </div>
        </section>
    </main>

    <!-- METRICS BAR -->
    <section class="panel metrics-bar" id="panel-metrics">
        <h2>Métriques Session</h2>
        <div id="metrics-grid" class="metrics-grid">
            <div class="metric-item">
                <span class="label">Fill rate</span>
                <span id="m-fill-rate" class="value">—</span>
            </div>
            <div class="metric-item">
                <span class="label">Adv. sel.</span>
                <span id="m-adverse" class="value">—</span>
            </div>
            <div class="metric-item">
                <span class="label">Spread cap.</span>
                <span id="m-spread-cap" class="value">—</span>
            </div>
            <div class="metric-item">
                <span class="label">Queue lag p95</span>
                <span id="m-lag" class="value">—</span>
            </div>
            <div class="metric-item">
                <span class="label">WS reconnects</span>
                <span id="m-reconnects" class="value">0</span>
            </div>
            <div class="metric-item">
                <span class="label">Kill-switch</span>
                <span id="m-killswitch" class="value">0</span>
            </div>
        </div>
    </section>

    <!-- EVENT FEED -->
    <section class="panel" id="panel-events">
        <h2>Feed d'événements</h2>
        <div id="events-container" class="events-feed">
            <div class="empty-state">En attente d'événements...</div>
        </div>
    </section>

    <script type="module" src="/static/js/app.js"></script>
</body>

</html>
